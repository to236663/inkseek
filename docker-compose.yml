services:
  web:
    build: .
    ports:
      - "3000:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - inkseek-network

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d 
    restart: unless-stopped
    networks:
      - inkseek-network

volumes:
  db_data:

networks:
  inkseek-network:
    driver: bridge