services:
  web:
    build: .
    ports:
      - "3000:80"
    volumes:
      - type: bind
        source: .
        target: /var/www/html
      - type: bind
        source: ./.env
        target: /var/www/html/.env
        read_only: true
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - inkseek-network

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - inkseek-network

volumes:
  db_data:


networks:
  inkseek-network:
    driver: bridge
